name: Build Zygisk Module

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Game package name'
        required: true
        default: 'com.example.game'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip android-ndk-r26b-linux.zip
          export NDK_HOME=$PWD/android-ndk-r26b

      - name: Build module
        run: |
          chmod +x build.sh
          ./build.sh ${{ github.event.inputs.package_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zygisk-il2cppdumper
          path: *.zip
